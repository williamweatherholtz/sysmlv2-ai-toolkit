<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Keel console</title>
<meta name="generator" content="keel serve (D0094) — computed live; the model is the only truth">
<style>
 :root{--bg:#f7f7f7;--bd:#ddd;--mut:#666;--good:#3d7a34;--warn:#b07a00;--bad:#b03a3c;--ac:#4e79a7}
 *{box-sizing:border-box} body{margin:0;font:13px system-ui,sans-serif;color:#222}
 header{padding:10px 16px;background:#1f2933;color:#fff} header h1{margin:0;font-size:16px;letter-spacing:.02em}
 header .sub{font-size:11px;color:#aeb9c4;margin-top:2px}
 nav{display:flex;gap:2px;background:var(--bg);border-bottom:1px solid var(--bd);padding:0 8px;flex-wrap:wrap}
 nav button{border:0;background:transparent;padding:9px 12px;font:12px system-ui;cursor:pointer;color:#444;border-bottom:2px solid transparent}
 nav button.on{color:#000;border-bottom-color:var(--ac);font-weight:600}
 main{padding:14px 16px}
 .cards{display:flex;flex-wrap:wrap;gap:12px}
 .c{flex:1 1 200px;min-width:190px;border:1px solid var(--bd);border-radius:8px;padding:12px;background:#fff;border-left:5px solid #ccc}
 .c.good{border-left-color:#59a14f} .c.warn{border-left-color:#f2a900} .c.bad{border-left-color:#e15759}
 .c .l{font-size:11px;text-transform:uppercase;color:var(--mut);letter-spacing:.03em}
 .c .v{font-size:26px;font-weight:600;margin:3px 0} .c .d{font-size:11px;color:#555;line-height:1.4}
 .row{border:1px solid var(--bd);border-radius:6px;padding:9px 11px;margin:6px 0;background:#fff}
 .row .t{font-weight:600} .row .m{font-size:11px;color:var(--mut);margin-top:2px;white-space:pre-wrap}
 .pill{display:inline-block;font-size:10px;padding:1px 6px;border-radius:9px;background:#eef;margin-left:6px;color:#446}
 .turn{border-left:3px solid var(--bd);padding:6px 10px;margin:7px 0;white-space:pre-wrap;font-size:12px;line-height:1.45}
 .turn.user{border-left-color:var(--ac);background:#f4f8fc} .turn.assistant{border-left-color:#59a14f;background:#f5faf3}
 .turn .who{font-size:10px;text-transform:uppercase;color:var(--mut);letter-spacing:.04em;margin-bottom:3px}
 .muted{color:var(--mut)} button.rb{border:1px solid var(--bd);background:#fff;border-radius:5px;padding:4px 9px;margin:0 5px 8px 0;cursor:pointer;font:12px system-ui}
 .il{color:var(--ac);cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px}
 #modal{position:fixed;right:0;top:0;bottom:0;width:min(580px,48vw);background:#fff;border-left:1px solid var(--bd);box-shadow:-4px 0 16px rgba(0,0,0,.10);padding:14px 18px;overflow:auto;display:none;z-index:30}
 #modal.on{display:block} #modal .x{float:right;cursor:pointer;color:var(--mut);font-size:20px;line-height:1}
 #modal h2{margin:2px 0 8px;font-size:15px} #modal table{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px}
 #modal td{border-top:1px solid #eee;padding:3px 5px;vertical-align:top} #modal td.k{color:var(--mut);width:135px;white-space:nowrap}
 #status{font-size:11px;color:var(--mut);padding:4px 16px}
</style></head><body>
<header><h1>Keel <span class="muted" style="color:#7d8a97;font-weight:400">· console</span></h1>
 <div class="sub">Smooth sailing with AI</div></header>
<nav id="nav"></nav>
<div id="status">loading…</div>
<main id="main"></main>
<div id="modal"></div>
<script>
// Directed-only (sr17/D0098): NO free-form Agent tab. Every AI action is directed at a named element
// (the modal's Critique ▶) and produces a recorded artifact (Issues). For free-form AI, open a terminal.
const TABS=[["orient","Orient"],["recent","Recent"],["decisions","Decisions"],["processes","Processes"],["dispositions","Findings"],["reports","Reports"],["history","Interaction history"],["settings","Settings"]];
let aiBridge=true; // serveSettings: whether the claude -p agent bridge is enabled (fetched from /api/settings)
function renderAgentEvent(data){
 try{const o=JSON.parse(data);
  if(o.type==='assistant'&&o.message&&o.message.content)return o.message.content.map(b=>b.type==='text'?b.text:(b.type==='tool_use'?`\n[tool: ${b.name}]`:'')).join('');
  if(o.type==='stream_event'&&o.event&&o.event.delta&&o.event.delta.text)return o.event.delta.text;
  if(o.type==='result')return `\n[result: ${o.subtype||''} ${o.total_cost_usd!=null?('$'+o.total_cost_usd):''}]\n`;
  return '';
 }catch(_){return ''}
}
let active="orient", reportName="assurance";
const main=document.getElementById('main'), nav=document.getElementById('nav'), status=document.getElementById('status');
TABS.forEach(([k,label])=>{const b=document.createElement('button');b.textContent=label;b.dataset.k=k;b.onclick=()=>{active=k;draw();render()};nav.appendChild(b)});
function draw(){[...nav.children].forEach(b=>b.classList.toggle('on',b.dataset.k===active))}
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function card(l,v,d,tone){return `<div class="c ${tone||''}"><div class=l>${esc(l)}</div><div class=v>${esc(v)}</div><div class=d>${d||''}</div></div>`}
async function get(u){const r=await fetch(u);if(!r.ok)throw new Error(r.status);return r.json()}
function list(arr,n){arr=arr||[];if(!arr.length)return '<span class=muted>—</span>';const s=arr.slice(0,n||8).join(', ');return esc(s)+(arr.length>(n||8)?` <span class=muted>…+${arr.length-(n||8)} more</span>`:'')}
function itemLink(name){return name?`<span class=il data-i="${esc(name)}">${esc(name)}</span>`:'<span class=muted>—</span>'}
function linkList(arr,n){arr=arr||[];if(!arr.length)return '<span class=muted>—</span>';n=n||12;const sh=arr.slice(0,n).map(itemLink).join(' · ');return sh+(arr.length>n?` <span class=muted>…+${arr.length-n} more</span>`:'')}
let mes=null;
function stopModalAgent(){if(mes){mes.close();mes=null}}
function closeItem(){stopModalAgent();document.getElementById('modal').classList.remove('on')}
function mlog(s){const l=document.getElementById('mlog');if(l){l.style.display='block';l.textContent+=s;l.scrollTop=l.scrollHeight}}
function runAgentModal(action,target){
 stopModalAgent();const l=document.getElementById('mlog');if(l){l.style.display='block';l.textContent=`=== ${action}: ${target} ===\n`}
 mes=new EventSource('/api/agent/stream?action='+encodeURIComponent(action)+'&target='+encodeURIComponent(target));
 mes.addEventListener('status',e=>mlog('· '+e.data+'\n\n'));
 mes.addEventListener('agent',e=>{const t=renderAgentEvent(e.data);if(t)mlog(t)});
 mes.addEventListener('done',e=>{mlog('\n\n'+e.data+'\n');stopModalAgent()});
 mes.addEventListener('error',e=>{if(e.data)mlog('\n[error] '+e.data+'\n')});
}
async function addTestResult(task){
 const v=(document.getElementById('trv')||{}).value||'pass';
 try{const r=await fetch('/api/testresult',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({task,verdict:v,judged_at:new Date().toISOString().slice(0,10),judged_by:'wweatherholtz'})});
  const j=await r.json().catch(()=>({}));if(!r.ok||j.error)throw new Error(j.error||('HTTP '+r.status));
  mlog('recorded TestResult '+j.name+' ('+j.verdict+') on '+task+'\n');
 }catch(e){mlog('error: '+e.message+'\n')}
}
const ACTLOG='<pre id=mlog style="background:#0f1720;color:#cfe3f0;padding:10px;border-radius:6px;max-height:42vh;overflow:auto;white-space:pre-wrap;font-size:11px;line-height:1.45;margin-top:8px;display:none"></pre>';
async function openItem(name){
 const m=document.getElementById('modal');m.classList.add('on');stopModalAgent();
 m.innerHTML='<span class=x onclick="closeItem()">✕</span><p class=muted>loading '+esc(name)+'…</p>';
 try{const d=await get('/api/item/'+encodeURIComponent(name));
  if(!d||!d.found){
   // likely a task/action (not an authored part) — offer: critique it, or append a downstream TestResult
   m.innerHTML='<span class=x onclick="closeItem()">✕</span><h2>'+esc(name)+' <span class=pill>task?</span></h2>'+
    '<p class=muted>Not an authored model item — likely an action/task. You can critique it or append a downstream TestResult.</p>'+
    '<div style="margin:8px 0">'+(aiBridge?'<button class=rb id=mcrit>Critique ▶</button>':'<span class=muted>AI critique off — Settings</span>')+' &nbsp; verdict <select id=trv><option>pass</option><option>fail</option></select> <button class=rb id=trbtn>Add TestResult</button></div>'+ACTLOG;
   if(aiBridge)document.getElementById('mcrit').onclick=()=>runAgentModal('critique',name);
   document.getElementById('trbtn').onclick=()=>addTestResult(name);
   return;
  }
  const attrs=(d.attrs||[]).map(a=>`<tr><td class=k>${esc(a.key)}</td><td>${esc(a.value)}</td></tr>`).join('')||'<tr><td class=muted colspan=2>no authored attrs</td></tr>';
  const edges=(arr,label)=>arr&&arr.length?('<h3 style="font-size:11px;color:var(--mut);text-transform:uppercase;margin:11px 0 3px">'+label+' ('+arr.length+')</h3>'+arr.map(e=>`<div style="font-size:11px;margin:2px 0"><span class=pill>${esc(e.kind)}</span> ${itemLink(e.node)}</div>`).join('')):'';
  const disp=d.type==='Issue'?'<button class=rb data-dv=act>Act</button><button class=rb data-dv=accept-risk>Accept-risk</button><button class=rb data-dv=dismiss>Dismiss</button>':'';
  m.innerHTML='<span class=x onclick="closeItem()">✕</span>'+
   '<h2>'+esc(d.name)+' <span class=pill>'+esc(d.type)+'</span>'+(d.marker?' <span class=pill>#'+esc(d.marker)+'</span>':'')+'</h2>'+
   '<div style="margin:6px 0">'+(aiBridge?'<button class=rb id=mcrit>Critique ▶</button>':'<span class=muted>AI critique off — Settings</span>')+' '+disp+'</div>'+ACTLOG+
   '<table>'+attrs+'</table>'+edges(d.outgoing,'Outgoing →')+edges(d.incoming,'Incoming ←');
  if(aiBridge)document.getElementById('mcrit').onclick=()=>runAgentModal('critique',d.name);
  [...m.querySelectorAll('.rb[data-dv]')].forEach(b=>b.onclick=()=>disposition(d.name,b.dataset.dv));
 }catch(e){m.innerHTML='<span class=x onclick="closeItem()">✕</span><p>error: '+esc(e.message)+'</p>'}
}
document.addEventListener('click',e=>{const a=e.target.closest('.il');if(a)openItem(a.dataset.i)});
async function disposition(finding,verdict){
 const rationale=prompt(`Rationale for "${verdict}" on ${finding}:`,'');
 if(rationale===null)return;
 const by=prompt('Your name (judgedBy):','wweatherholtz')||'';
 status.textContent='recording disposition…';
 try{
  const r=await fetch('/api/disposition',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({finding,verdict,rationale,judged_at:new Date().toISOString().slice(0,10),judged_by:by})});
  const j=await r.json().catch(()=>({}));
  if(!r.ok||j.error)throw new Error(j.error||('HTTP '+r.status));
  status.textContent='recorded '+j.name+' ('+j.verdict+')';
  // sr16: ACT attaches a tracked resolver (the fix is then done by the process-aware agent / you; re-verify = re-Critique).
  if(verdict==='act'){
   const title=prompt('ACT — describe the resolver (what the fix is):','');
   if(title){try{const rr=await fetch('/api/resolver',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({finding,title})});const rj=await rr.json().catch(()=>({}));if(!rr.ok||rj.error)throw new Error(rj.error||('HTTP '+rr.status));status.textContent='ACT recorded + resolver '+rj.resolver+' attached'}catch(re){status.textContent='resolver error: '+re.message}}
  }
  render();
 }catch(e){status.textContent='disposition error: '+e.message}
}

async function render(){
 status.textContent='refreshing…';
 try{
  if(active==='orient'){const o=await get('/api/orient');
   main.innerHTML='<div class=cards>'+
    card('Progress',`${o.counts.done} / ${o.counts.outstanding}`,'done / outstanding tasks','good')+
    card('Ready to start',(o.ready||[]).length,linkList(o.ready,6),(o.ready||[]).length?'good':'warn')+
    card('Sprints in progress',(o.in_progress_sprints||[]).length,(o.in_progress_sprints||[]).map(s=>itemLink(s.sprint)+' (pending '+(s.pending||'—')+')').join('; ')||'none',(o.in_progress_sprints||[]).length<=2?'good':'warn')+
    card('Open issues',(o.open_issues||[]).length,linkList(o.open_issues,8),(o.open_issues||[]).length?'warn':'good')+
    card('Suspect / stale',(o.suspect||[]).length,linkList(o.suspect,10),(o.suspect||[]).length?'warn':'good')+
   '</div>';
  } else if(active==='recent'){const r=await get('/api/recent');
   main.innerHTML='<p class=muted>'+esc(r.recent||'')+'</p>'+(r.commits||[]).map(c=>`<div class=row><div class=t><span class=pill>${esc(c.date)}</span> ${esc(c.subject)} <span class=muted>${esc(c.sha)}</span></div><div class=m>${linkList((c.files||[]).map(f=>f.split('/').pop().replace(/\.sysml$/,'')),8)}</div></div>`).join('')||'<span class=muted>no recent activity</span>';
  } else if(active==='decisions'){const d=await get('/api/decisions');
   // sr15: decisions newest-first (dNNNN is sequential ~ chronological); the score order stays as a tiebreak from the API.
   const arr=(d.decisions||[]).slice().sort((a,b)=>String(b.decision||b.name||'').localeCompare(String(a.decision||a.name||'')));
   main.innerHTML='<p class=muted>'+esc(d.report||'')+' · newest-first</p>'+arr.map(x=>`<div class=row><div class=t>${itemLink(x.id||x.decision||x.name)} ${esc(x.title||'')}</div><div class=m>${esc([x.uncritiqued?'uncritiqued':'',x.references_retired?'references-retired':'',x.superseded_in_part?'superseded-in-part?':''].filter(Boolean).join(' · '))}</div></div>`).join('')||'<span class=muted>no decisions</span>';
  } else if(active==='processes'){const p=await get('/api/processes');
   main.innerHTML=(p.processes||[]).map(x=>`<div class=row><div class=t>${x.name?itemLink(x.name):esc(x.file)} <span class=muted>${esc(x.title||'')}</span></div><div class=m>${esc(x.file)} — ${esc(x.purpose)}</div></div>`).join('')||'<span class=muted>none</span>';
  } else if(active==='dispositions'){const d=await get('/api/dispositions');
   main.innerHTML='<div class=cards>'+card('≥Medium findings',d.ge_medium_findings,'total','')+card('Dispositioned',d.dispositioned,'have a typed verdict','good')+card('Undispositioned',d.undispositioned,'awaiting a verdict',d.undispositioned?'warn':'good')+'</div>'+
    '<p class=muted>Disposition a finding — your click + rationale is your explicit verdict (recorded via the write API; not committed).</p>'+
    (d.findings||[]).map(f=>`<div class=row><div class=t>${itemLink(f.finding)} <span class=pill>${esc(f.severity)}</span> <span class=pill>${esc(f.disposition)}</span></div><div style="margin-top:5px"><button class=rb data-f="${esc(f.finding)}" data-v="act">Act</button><button class=rb data-f="${esc(f.finding)}" data-v="accept-risk">Accept-risk</button><button class=rb data-f="${esc(f.finding)}" data-v="dismiss">Dismiss</button></div></div>`).join('');
   [...main.querySelectorAll('.rb[data-v]')].forEach(b=>b.onclick=()=>disposition(b.dataset.f,b.dataset.v));
  } else if(active==='reports'){
   const names=['assurance','traceability','quality-debt','flow','governance'];
   const r=await get('/api/report/'+reportName);
   main.innerHTML='<div>'+names.map(n=>`<button class=rb data-r="${n}" ${n===reportName?'style="border-color:var(--ac);font-weight:600"':''}>${n}</button>`).join('')+'</div>'+
    '<p class=muted><a href="/view/report/'+reportName+'" target=_blank>Open full HTML report ↗</a> &nbsp;·&nbsp; <a href="/view/diagram" target=_blank>Open model diagram ↗</a></p>'+
    '<h3 style="margin:6px 0">'+esc(r.title||reportName)+'</h3><div class=cards>'+(r.cards||[]).map(c=>card(c.label,c.value,esc(c.detail),c.tone)).join('')+'</div>';
   [...main.querySelectorAll('.rb[data-r]')].forEach(b=>b.onclick=()=>{reportName=b.dataset.r;render()});
  } else if(active==='settings'){const s=await get('/api/settings');aiBridge=!!s.agentBridge;
   main.innerHTML='<div class=row><div class=t><label><input type=checkbox id=abtog '+(aiBridge?'checked':'')+'> Enable AI agent bridge (in-console Critique)</label></div>'+
    '<div class=m>Drives your local <code>claude -p</code> (headless). Auth = your subscription/enterprise login; never sets ANTHROPIC_API_KEY. CAVEAT (D0094): <code>claude -p</code> headless billing has been in flux and may bill as API — turn OFF if you want to avoid that. When OFF, the console is read/oversight-only and AI critique runs in your own Claude Code session. Persists to .keel-serve.json.</div></div>';
   document.getElementById('abtog').onchange=async e=>{const v=e.target.checked;try{const r=await fetch('/api/settings',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({agentBridge:v})});const j=await r.json();aiBridge=!!j.agentBridge;status.textContent='settings saved (agent bridge '+(aiBridge?'ON':'OFF')+')'}catch(err){status.textContent='settings error: '+err.message}};
  } else if(active==='history'){const h=await get('/api/history');
   if(!h.available){main.innerHTML='<p class=muted>'+esc(h.note||'no transcripts found')+'</p>';}
   else{main.innerHTML='<p class=muted>'+(h.sessions||[]).length+' session(s) · showing latest ('+esc(h.current_id)+'). Source: '+esc(h.dir)+' (read-only lens; never copied into the model).</p>'+
    (h.current||[]).map(t=>`<div class="turn ${esc(t.role)}"><div class=who>${esc(t.role)}</div>${esc(t.text)}</div>`).join('')||'<span class=muted>empty</span>';}
  }
  status.textContent='live · updated '+new Date().toLocaleTimeString();
 }catch(e){status.textContent='error: '+e.message}
}
// load the agent-bridge setting up front so Critique buttons reflect it (serveSettings), then draw
fetch('/api/settings').then(r=>r.json()).then(s=>{aiBridge=!!s.agentBridge}).catch(()=>{}).finally(()=>{draw();render()});
// pre-load the light views to warm the server-side cache so tab-switches are instant
['orient','decisions','dispositions','processes'].forEach(k=>fetch('/api/'+k).catch(()=>{}));
// event-driven refresh: the server pushes `changed` only when the model's content fingerprint flips
let evs=new EventSource('/api/events');
evs.addEventListener('hello',()=>{status.textContent='live (event-driven)'});
evs.addEventListener('changed',()=>render());
evs.onerror=()=>{status.textContent='live: reconnecting…'};
// slow safety-net refresh in case the event stream drops (NOT the primary path)
setInterval(render,30000);
</script></body></html>
